name: Build Release

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact-name: CommentsExtractor-macOS.zip
            artifact-path: dist/CommentsExtractor-macOS.zip

          - os: windows-latest
            artifact-name: CommentsExtractor-Windows.zip
            artifact-path: dist/CommentsExtractor-Windows.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller spec
        run: |
          python -m PyInstaller comments_extractor.spec

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r CommentsExtractor-macOS.zip "Comments Extractor.app"

      - name: Package Windows app
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Compress-Archive `
            -Path "dist\Comments Extractor\*" `
            -DestinationPath "dist\CommentsExtractor-Windows.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact-path }}
